project:
  name: acoustic-event-detection-benchmark
  seed: 42

data:
  base_dir: /Volumes/CurrentSave/Data/Kaggle/freesound-audio-tagging-bencmark
  base_folder_name: FSDKaggle2019.
  train_dir: audio_train_curated
  train_noisy_dir: audio_train_noisy
  val_dir: meta
  test_dir: audio_test
  sample_rate: 44100
  clip_duration: 5.0
  problematic_files_path: configs/problematic_files.csv

spectrogram:
  # Custom SuperGaussian filter bank parameters
  f_min: 20.0
  f_mid: 1000.0
  f_max: 8000.0
  n_bands: 128
  hop_length: 512
  n_fft: 2048
  signal_duration: 5.0  # Fixed duration in seconds for multi-resolution method

  # Normalization configuration
  normalization:
    enable_temporal_masking: true
    masking_threshold_db: 20.0
    masking_reference: percentile
    masking_percentile: 95.0
    floor_db: 60.0
    floor_reference: global_max
    percentile: 95.0
    normalize_method: linear

model:
  # Unified model configuration
  # Efficient CNN configuration (for future use)  name: cnn
  encoder_channels: [ 24, 32, 48, 96 ]
  encoder_repeats: [ 2, 2, 3, 3 ]
  expansions: [ 4, 4, 6, 6 ]
  activation: Mish
  norm_type: group
  norm_groups: 1
  use_se: true
  se_reduction: 4
  drop_connect_rate: 0.2
  weight_scaling: normalization
  weight_norm_interval: 1
  num_classes: 80

augmentation:
  # Spectrogram masking
  spec_augment: false  # Disabled by default for baseline
  freq_mask_param: 20
  time_mask_param: 40
  num_freq_masks: 2
  num_time_masks: 2

  # Audio augmentations
  time_stretch: false
  time_stretch_range: [0.8, 1.2]
  pitch_shift: false
  pitch_shift_range: [-2, 2]
  add_noise: false
  noise_snr_range: [30.0, 40.0]
  reverberation: false
  reverb_rt60_range: [0.2, 1.5]
  reverb_dry_wet_mix: 0.3
  freq_response_perturbation: false
  freq_response_gain_std: 3.0
  mixup: false
  mixup_alpha: 0.4

training:
  batch_size: 64
  epochs: 30
  learning_rate: 0.0005
  weight_decay: 0.0001

  # Additional training config
  optimizer: Adam
  scheduler: cosine
  lr_min: 1.0e-6
  warmup_epochs: 5
  use_noisy_data: false
  noisy_sample_weight: 0.5
  label_smoothing: 0.1
  use_amp: true
  val_split: 0.2
  val_interval: 1

evaluation:
  threshold: 0.5
  save_predictions: true
  compute_per_class_metrics: true

output:
  model_dir: reports/models
  metrics_dir: reports/metrics
  figures_dir: reports/figures
  tensorboard_dir: reports/tensorboard